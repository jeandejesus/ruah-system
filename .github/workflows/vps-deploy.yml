name: VPS Auto Deploy

on:
  push:
    branches:
      - main  # Ou sua branch de produção

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Executar Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}        # Configure no GitHub Secrets
          username: ${{ secrets.VPS_USER }}    # Configure no GitHub Secrets
          key: ${{ secrets.VPS_SSH_KEY }}      # Chave privada SSH no GitHub Secrets
          port: 22
          script: |
            # Entra na pasta do projeto (Ajuste o caminho conforme o local na VPS)
            cd /home/ubuntu/apps/ruah-system || exit

            # Atualiza o código
            git pull origin main

            # Reconstrói os containers
            docker compose up -d --build

            # Limpa imagens antigas não utilizadas (opcional)
            docker image prune -f
